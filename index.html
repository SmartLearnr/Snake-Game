<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-board">
                <span class="score">分数: <strong id="score">0</strong></span>
                <span class="high-score">最高: <strong id="highScore">0</strong></span>
            </div>
        </header>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="gameOverlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlayTitle">游戏开始</h2>
                    <p id="overlayText">点击开始按钮开始游戏</p>
                    <button id="startBtn" class="btn btn-primary">开始游戏</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="pauseBtn" class="btn" disabled>暂停</button>
            <button id="restartBtn" class="btn">重新开始</button>
        </div>

        <div class="settings">
            <span>速度:</span>
            <label><input type="radio" name="speed" value="200" checked> 慢</label>
            <label><input type="radio" name="speed" value="150"> 中</label>
            <label><input type="radio" name="speed" value="100"> 快</label>
        </div>

        <div class="instructions">
            <p>操作说明: 使用 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向</p>
        </div>

        <div class="mobile-controls" id="mobileControls">
            <button class="mobile-btn" data-dir="up">↑</button>
            <div class="mobile-row">
                <button class="mobile-btn" data-dir="left">←</button>
                <button class="mobile-btn" data-dir="down">↓</button>
                <button class="mobile-btn" data-dir="right">→</button>
            </div>
        </div>
    </div>

    <script src="js/snake.js"></script>
    <script src="js/food.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
